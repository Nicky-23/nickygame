<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>スーの一族</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      font-family: "Hiragino Kaku Gothic Pro", "ヒラギノ角ゴ Pro", "Meiryo", "メイリオ", "Yu Gothic", "游ゴシック", sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    #hub {
      width: 100%;
      max-width: 480px;
    }
    .hub-title {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a29bfe, #fd79a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .game-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 16px 20px;
      text-decoration: none;
      color: #fff;
      transition: background 0.15s, transform 0.12s, border-color 0.15s;
    }
    a.game-card:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(162,155,254,0.6);
      transform: scale(1.02);
    }
    a.game-card:active { transform: scale(0.98); }
    .game-card.coming-soon {
      opacity: 0.4;
      cursor: default;
    }
    .game-thumb {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .game-thumb-emoji {
      width: 72px;
      height: 72px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .game-info {
      flex: 1;
    }
    .game-name {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .game-desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.4;
    }
    .game-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 3px 8px;
      margin-top: 6px;
      display: inline-block;
      color: rgba(255,255,255,0.5);
    }
    .game-arrow {
      font-size: 1.2rem;
      color: rgba(162,155,254,0.8);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="hub">
    <h1 class="hub-title">✨ スーの一族</h1>
    <div class="game-list">

      <a class="game-card" href="san.html">
        <img src="image/san1.png" class="game-thumb" alt="サン">
        <div class="game-info">
          <div class="game-name">サンの冒険</div>
          <div class="game-desc">かずカードで　てきをたおそう！</div>
        </div>
        <span class="game-arrow">▶</span>
      </a>

      <a class="game-card" href="game2.html">
        <div class="game-thumb-emoji">👴</div>
        <div class="game-info">
          <div class="game-name">ジーのお買い物</div>
          <div class="game-desc">かずを　おぼえて　おかいもの！</div>
        </div>
        <span class="game-arrow">▶</span>
      </a>

      <div class="game-card coming-soon">
        <div class="game-thumb-emoji">🎮</div>
        <div class="game-info">
          <div class="game-name">ゲームその3</div>
          <div class="game-desc">もうすぐ　あそべるよ！</div>
          <span class="game-badge">準備中</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
